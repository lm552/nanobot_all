<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>DataLab Pro · 智能科研分析</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f2f0fa;
      --card: rgba(255,255,255,0.85);
      --accent: #5a4cd8;
      --accent-deep: #4638b8;
      --accent-light: rgba(90,76,216,0.08);
      --accent-glow: rgba(90,76,216,0.15);
      --border: rgba(0,0,0,0.06);
      --text: #18161f;
      --text2: #4a4658;
      --text3: #7a7688;
      --radius: 18px;
    }
    body.dark {
      --bg: #0c0a1a;
      --card: rgba(18,15,36,0.82);
      --accent: #8B70FF;
      --accent-deep: #6d5adf;
      --accent-light: rgba(139,112,255,0.10);
      --accent-glow: rgba(139,112,255,0.22);
      --border: rgba(255,255,255,0.07);
      --text: #e4e1f6;
      --text2: #b0acd0;
      --text3: #7e7a98;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter','PingFang SC','Microsoft YaHei',sans-serif;
      background:var(--bg); color:var(--text); height:100vh; overflow:hidden;
      transition:0.3s;
    }
    .hide-scrollbar { scrollbar-width:none; -ms-overflow-style:none; }
    .hide-scrollbar::-webkit-scrollbar { width:0; height:0; display:none; }
    .thin-scrollbar { scrollbar-width:thin; scrollbar-color:transparent transparent; }
    .thin-scrollbar::-webkit-scrollbar { width:3px; }
    .thin-scrollbar::-webkit-scrollbar-track { background:transparent; }
    .thin-scrollbar::-webkit-scrollbar-thumb { background:transparent; border-radius:3px; }
    .thin-scrollbar:hover::-webkit-scrollbar-thumb { background:rgba(128,128,128,0.25); }
    .app { display:flex; flex-direction:column; height:100vh; padding:12px 16px; gap:10px; max-width:1920px; margin:0 auto; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--card); backdrop-filter:blur(12px);
      border:2px solid var(--accent); border-radius:var(--radius);
      padding:0 24px; height:52px; flex-shrink:0;
      box-shadow:0 0 0 1px var(--accent-light),0 0 24px var(--accent-glow);
    }
    .logo {
      font-family:'Playfair Display','Georgia',serif; font-weight:700; font-size:1.25rem; color:var(--accent);
      display:flex; align-items:center; gap:10px; letter-spacing:-0.01em;
    }
    .logo .dot { width:7px; height:7px; background:var(--accent); border-radius:50%; box-shadow:0 0 12px var(--accent-glow); animation:dotPulse 2.4s infinite; }
    @keyframes dotPulse { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.7); opacity:0.45; } }
    .icon-btn {
      width:34px; height:34px; border:1.5px solid var(--border); background:transparent;
      cursor:pointer; color:var(--text2); border-radius:50%; display:flex;
      align-items:center; justify-content:center; transition:0.2s; font-size:1rem;
    }
    .icon-btn:hover { color:var(--accent); border-color:var(--accent); background:var(--accent-light); }
    .main-layout { flex:1; display:flex; gap:10px; min-height:0; }
    .panel-left {
      width:290px; background:var(--card); backdrop-filter:blur(12px);
      border:2px solid var(--accent); border-radius:var(--radius);
      padding:18px 16px; display:flex; flex-direction:column; gap:14px; overflow-y:auto;
      box-shadow:0 0 0 1px var(--accent-light);
    }
    .section-title {
      font-weight:700; font-size:0.65rem; color:var(--accent); text-transform:uppercase;
      letter-spacing:0.06em; display:flex; align-items:center; gap:7px;
    }
    .section-title::before { content:''; width:3px; height:14px; background:var(--accent); border-radius:2px; }
    .upload-area {
      border:2px dashed var(--accent); border-radius:14px; padding:20px 12px;
      text-align:center; cursor:pointer; transition:0.25s; background:var(--accent-light); position:relative;
    }
    .upload-area:hover { background:rgba(90,76,216,0.14); border-style:solid; }
    .upload-area input { display:none; }
    .upload-label { font-size:0.68rem; font-weight:600; color:var(--accent); }
    .upload-hint { font-size:0.5rem; color:var(--text3); margin-top:3px; }
    .file-name { font-size:0.52rem; color:var(--accent); margin-top:6px; font-weight:500; background:rgba(90,76,216,0.06); display:inline-block; padding:2px 10px; border-radius:10px; }
    .select-group { display:flex; flex-direction:column; gap:4px; }
    .select-group label { font-size:0.54rem; color:var(--text3); font-weight:500; letter-spacing:0.02em; }
    select {
      padding:8px 10px; border:1.5px solid var(--border); border-radius:8px;
      background:var(--card); color:var(--text); font-size:0.6rem; width:100%; font-family:inherit;
    }
    select:focus { outline:none; border-color:var(--accent); }
    .btn {
      padding:9px 16px; background:var(--accent-deep); color:#fff; border:none;
      border-radius:9px; font-weight:600; font-size:0.6rem; cursor:pointer;
      transition:0.2s; width:100%; text-transform:uppercase; letter-spacing:0.04em;
      box-shadow:0 2px 8px rgba(90,76,216,0.25);
    }
    .btn:hover { opacity:0.9; box-shadow:0 4px 16px var(--accent-glow); }
    .chart-type-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; }
    .chart-type-btn {
      padding:8px 4px; border:1.5px solid var(--border); border-radius:8px;
      background:transparent; color:var(--text2); font-size:0.54rem; cursor:pointer;
      transition:0.2s; text-align:center; font-weight:500;
    }
    .chart-type-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-light); font-weight:600; }
    .chart-type-btn:hover { border-color:var(--accent); }
    .data-preview { border-top:1px solid var(--border); padding-top:10px; margin-top:2px; }
    .preview-table {
      width:100%; font-size:0.5rem; border-collapse:collapse; margin-top:6px;
    }
    .preview-table th { background:var(--accent-light); color:var(--accent); padding:5px 7px; text-align:left; font-weight:600; border-radius:4px; }
    .preview-table td { padding:4px 7px; border-bottom:1px solid var(--border); color:var(--text2); }
    .preview-table tr:hover td { background:rgba(90,76,216,0.03); }
    .panel-right { flex:1; display:flex; flex-direction:column; gap:10px; min-width:0; }
    .chart-card {
      flex:1; background:var(--card); backdrop-filter:blur(12px);
      border:2px solid var(--accent); border-radius:var(--radius);
      padding:16px 18px; display:flex; flex-direction:column;
      box-shadow:0 0 0 1px var(--accent-light);
    }
    .chart-header {
      display:flex; justify-content:space-between; font-weight:700;
      font-size:0.68rem; color:var(--text2); margin-bottom:6px; flex-shrink:0;
    }
    #mainChart { flex:1; min-height:0; }
    .insight-row { display:flex; gap:10px; height:195px; flex-shrink:0; }
    .insight-card {
      flex:1; background:var(--card); backdrop-filter:blur(12px);
      border:2px solid var(--accent); border-radius:var(--radius);
      padding:16px 18px; overflow-y:auto; font-size:0.56rem; color:var(--text2);
      line-height:1.65; box-shadow:0 0 0 1px var(--accent-light);
    }
    .insight-card-title {
      font-weight:700; font-size:0.64rem; color:var(--accent); margin-bottom:10px;
      letter-spacing:0.03em; display:flex; align-items:center; gap:6px;
    }
    .insight-card-title::before { content:''; width:3px; height:14px; background:var(--accent); border-radius:2px; }
    /* 描述性统计表格字号加大 */
    .stat-table {
      width:100%; border-collapse:collapse; font-size:0.62rem;  /* 整体字号加大 */
    }
    .stat-table th {
      text-align:left; color:var(--text3); font-weight:500; padding:6px 4px 4px 0;
      border-bottom:1px solid var(--border); font-size:0.56rem; text-transform:uppercase;
    }
    .stat-table td {
      padding:5px 4px; border-bottom:1px solid var(--border); color:var(--text2);
      font-family:'JetBrains Mono','SF Mono','Consolas',monospace; font-size:0.6rem;
    }
    .stat-table tr:last-child td { border-bottom:none; }
    .stat-table .var-name { color:var(--accent); font-weight:600; font-family:inherit; }
    /* 相关性分析专业卡片样式保持不变 */
    .corr-vars {
      font-size:0.62rem; font-weight:600; color:var(--text); margin-bottom:12px;
      display:flex; align-items:center; gap:8px;
    }
    .corr-arrow { color:var(--accent); font-size:1rem; }
    .corr-main {
      display:flex; align-items:baseline; gap:12px; margin-bottom:8px;
    }
    .corr-r {
      font-size:1.5rem; font-weight:800; color:var(--accent); line-height:1;
    }
    .corr-sig {
      background:var(--accent); color:#fff; padding:2px 10px; border-radius:6px;
      font-size:0.55rem; font-weight:700; letter-spacing:0.03em;
    }
    .corr-stats {
      font-size:0.52rem; color:var(--text3); margin-bottom:10px;
      display:flex; gap:12px; flex-wrap:wrap;
    }
    .corr-stats span { white-space:nowrap; }
    .corr-conclusion {
      padding:8px 12px; background:var(--accent-light); border-radius:8px;
      font-weight:500; color:var(--accent); font-size:0.55rem; line-height:1.4;
    }
    @media(max-width:900px) {
      .main-layout { flex-direction:column; }
      .panel-left { width:100%; flex-direction:row; flex-wrap:wrap; max-height:200px; }
      .insight-row { flex-direction:column; height:auto; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo"><span class="dot"></span>DataLab Pro</div>
    <button class="icon-btn" onclick="toggleTheme()" title="切换深色/浅色模式">🌓</button>
  </div>
  <div class="main-layout">
    <div class="panel-left thin-scrollbar">
      <div class="section-title">数据源</div>
      <div class="upload-area" id="uploadArea">
        <div class="upload-label">点击上传或拖拽文件</div>
        <div class="upload-hint">支持 CSV / Excel (.xlsx .xls)</div>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
        <div class="file-name" id="fileName"></div>
      </div>
      <button class="btn" id="loadSample">加载园艺实验数据</button>

      <div class="section-title">变量选择</div>
      <div class="select-group">
        <label>X 轴变量</label>
        <select id="xColSelect"><option>请先上传数据</option></select>
      </div>
      <div class="select-group">
        <label>Y 轴变量（可选）</label>
        <select id="yColSelect"><option value="">— 不选择 —</option></select>
      </div>

      <div class="section-title">图表类型</div>
      <div class="chart-type-grid" id="chartTypeGrid">
        <button class="chart-type-btn active" data-type="scatter">散点图</button>
        <button class="chart-type-btn" data-type="bar">柱状图</button>
        <button class="chart-type-btn" data-type="boxplot">箱线图</button>
        <button class="chart-type-btn" data-type="heatmap">热力图</button>
        <button class="chart-type-btn" data-type="radar">雷达图</button>
        <button class="chart-type-btn" data-type="parallel">平行坐标</button>
      </div>
      <button class="btn" id="updateChart">刷新图表</button>

      <div class="data-preview" id="previewSection">
        <div class="section-title">数据预览</div>
        <div id="previewTable"></div>
      </div>
    </div>

    <div class="panel-right">
      <div class="chart-card">
        <div class="chart-header">
          <span id="chartTitle">散点图 · 变量关系</span>
          <span style="font-size:0.5rem;color:var(--text3);">滚轮缩放 · 拖拽平移</span>
        </div>
        <div id="mainChart"></div>
      </div>
      <div class="insight-row">
        <div class="insight-card hide-scrollbar" id="statsInsight">
          <div class="insight-card-title">描述性统计</div>
          <div id="statsContent"></div>
        </div>
        <div class="insight-card hide-scrollbar" id="corrInsight">
          <div class="insight-card-title">相关性分析</div>
          <div id="corrContent"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let rawData = [];
  let columns = [];
  let numericCols = [];
  let currentChartType = 'scatter';
  let mainChart = null;

  const sampleData = [
    {品种:'富士',处理:'CK',单果重_g:185,糖度_Brix:13.2,酸度_pH:3.4,VC含量_mg:4.2,产量_kg:22.5},
    {品种:'富士',处理:'A',单果重_g:210,糖度_Brix:15.1,酸度_pH:3.1,VC含量_mg:5.8,产量_kg:25.1},
    {品种:'富士',处理:'B',单果重_g:195,糖度_Brix:14.8,酸度_pH:3.3,VC含量_mg:5.2,产量_kg:24.3},
    {品种:'嘎啦',处理:'CK',单果重_g:155,糖度_Brix:12.8,酸度_pH:3.6,VC含量_mg:3.8,产量_kg:19.2},
    {品种:'嘎啦',处理:'A',单果重_g:172,糖度_Brix:14.0,酸度_pH:3.4,VC含量_mg:4.9,产量_kg:21.8},
    {品种:'嘎啦',处理:'B',单果重_g:168,糖度_Brix:13.9,酸度_pH:3.5,VC含量_mg:4.5,产量_kg:20.9},
    {品种:'金冠',处理:'CK',单果重_g:200,糖度_Brix:14.5,酸度_pH:3.2,VC含量_mg:6.1,产量_kg:27.0},
    {品种:'金冠',处理:'A',单果重_g:225,糖度_Brix:16.3,酸度_pH:2.9,VC含量_mg:7.2,产量_kg:30.2},
    {品种:'金冠',处理:'B',单果重_g:218,糖度_Brix:15.9,酸度_pH:3.0,VC含量_mg:6.8,产量_kg:28.5},
    {品种:'红星',处理:'CK',单果重_g:190,糖度_Brix:13.5,酸度_pH:3.3,VC含量_mg:5.0,产量_kg:23.0},
    {品种:'红星',处理:'A',单果重_g:205,糖度_Brix:14.7,酸度_pH:3.1,VC含量_mg:5.9,产量_kg:24.8},
    {品种:'红星',处理:'B',单果重_g:198,糖度_Brix:14.4,酸度_pH:3.2,VC含量_mg:5.4,产量_kg:24.1}
  ];

  function loadData(dataArray) {
    rawData = dataArray;
    if (rawData.length === 0) return;
    columns = Object.keys(rawData[0]);
    numericCols = columns.filter(col => typeof rawData[0][col] === 'number');
    populateSelectors();
    updatePreview();
    updateAll();
  }

  function populateSelectors() {
    const xSel = document.getElementById('xColSelect');
    const ySel = document.getElementById('yColSelect');
    xSel.innerHTML = ''; ySel.innerHTML = '<option value="">— 不选择 —</option>';
    columns.forEach(col => {
      const optX = document.createElement('option'); optX.value = col; optX.textContent = col;
      xSel.appendChild(optX);
      if (numericCols.includes(col)) {
        const optY = document.createElement('option'); optY.value = col; optY.textContent = col;
        ySel.appendChild(optY);
      }
    });
    if (numericCols.length > 0) {
      xSel.value = numericCols[0];
      if (numericCols.length > 1) ySel.value = numericCols[1];
    }
  }

  function updatePreview() {
    const previewDiv = document.getElementById('previewTable');
    if (rawData.length === 0) { previewDiv.innerHTML = '<span style="font-size:0.5rem;color:var(--text3);">暂无数据</span>'; return; }
    const displayCols = columns.slice(0,5);
    let html = '<table class="preview-table"><thead><tr>';
    displayCols.forEach(c => html += `<th>${c}</th>`);
    html += '</tr></thead><tbody>';
    rawData.slice(0,8).forEach(row => {
      html += '<tr>';
      displayCols.forEach(c => html += `<td>${row[c] ?? ''}</td>`);
      html += '</tr>';
    });
    html += '</tbody></table>';
    if (rawData.length > 8) html += `<div style="font-size:0.45rem;color:var(--text3);margin-top:4px;">显示前8行，共 ${rawData.length} 条记录</div>`;
    previewDiv.innerHTML = html;
  }

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        let data;
        if (file.name.endsWith('.csv')) { data = parseCSV(e.target.result); }
        else { const wb = XLSX.read(e.target.result,{type:'binary'}); const sheet = wb.Sheets[wb.SheetNames[0]]; data = XLSX.utils.sheet_to_json(sheet); }
        if (data.length === 0) throw new Error('文件中无有效数据行');
        document.getElementById('fileName').textContent = file.name;
        loadData(data);
      } catch (err) { alert('文件解析失败：' + err.message); }
    };
    if (file.name.endsWith('.csv')) reader.readAsText(file,'UTF-8');
    else reader.readAsBinaryString(file);
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h=>h.trim());
    const data = [];
    for (let i=1;i<lines.length;i++) {
      const vals = lines[i].split(',');
      if (vals.length !== headers.length) continue;
      const row = {};
      headers.forEach((h,idx)=>{ const v=vals[idx].trim(); const num=Number(v); row[h]=isNaN(num)?v:num; });
      data.push(row);
    }
    return data;
  }

  document.getElementById('uploadArea').addEventListener('click',()=>document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change',(e)=>{ if(e.target.files[0]) handleFile(e.target.files[0]); });
  document.getElementById('uploadArea').addEventListener('dragover',(e)=>{ e.preventDefault(); });
  document.getElementById('uploadArea').addEventListener('drop',(e)=>{ e.preventDefault(); const file=e.dataTransfer.files[0]; if(file) handleFile(file); });
  document.getElementById('loadSample').addEventListener('click',()=>{ document.getElementById('fileName').textContent='园艺实验数据.xlsx'; loadData(sampleData); });

  function updateChart() {
    const xCol = document.getElementById('xColSelect').value;
    const yCol = document.getElementById('yColSelect').value;
    if (!xCol) return;
    const chartDom = document.getElementById('mainChart');
    if (mainChart) mainChart.dispose();
    mainChart = echarts.init(chartDom);
    const textColor = getComputedStyle(document.body).getPropertyValue('--text2').trim();
    const baseOpt = {
      backgroundColor:'transparent', tooltip:{trigger:'item'},
      grid:{left:55,right:25,top:20,bottom:35},
      xAxis:{name:xCol,nameTextStyle:{color:textColor,fontSize:10}},
      yAxis:{name:yCol||'',nameTextStyle:{color:textColor,fontSize:10}}
    };

    if (currentChartType==='scatter') {
      const data = rawData.map(r=>[r[xCol],r[yCol]||0]).filter(d=>typeof d[0]==='number');
      mainChart.setOption({...baseOpt,series:[{type:'scatter',data,symbolSize:8,itemStyle:{color:'#8B70FF',opacity:0.8}}]});
      document.getElementById('chartTitle').textContent = `散点图 · ${xCol} vs ${yCol||'?'}`;
    } else if (currentChartType==='bar') {
      const groups = [...new Set(rawData.map(r=>r[xCol]))];
      const values = groups.map(g=>{
        const vals = rawData.filter(r=>r[xCol]===g).map(r=>Number(r[yCol])).filter(v=>!isNaN(v));
        return vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2) : 0;
      });
      mainChart.setOption({...baseOpt,xAxis:{...baseOpt.xAxis,data:groups},series:[{type:'bar',data:values,itemStyle:{color:'#5a4cd8',borderRadius:[6,6,0,0]}}]});
    } else if (currentChartType==='boxplot') {
      const groups = [...new Set(rawData.map(r=>r[xCol]))];
      const boxData = groups.map(g=>{
        const vals = rawData.filter(r=>r[xCol]===g).map(r=>Number(r[yCol])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
        if (vals.length<5) return null;
        const q1=vals[Math.floor(vals.length/4)], q3=vals[Math.floor(3*vals.length/4)];
        return [vals[0],q1,vals[Math.floor(vals.length/2)],q3,vals[vals.length-1]];
      }).filter(d=>d!==null);
      mainChart.setOption({...baseOpt,xAxis:{...baseOpt.xAxis,data:groups},series:[{type:'boxplot',data:boxData,itemStyle:{color:'#8B70FF'}}]});
    } else if (currentChartType==='heatmap') {
      const xVals=[...new Set(rawData.map(r=>r[xCol]))], yVals=[...new Set(rawData.map(r=>r[yCol]))];
      const data=[];
      xVals.forEach((x,i)=>yVals.forEach((y,j)=>{ const cnt=rawData.filter(r=>r[xCol]===x&&r[yCol]===y).length; data.push([i,j,cnt]); }));
      mainChart.setOption({grid:{left:80,right:20,top:20,bottom:45},xAxis:{data:xVals,axisLabel:{rotate:30}},yAxis:{data:yVals},visualMap:{min:0,max:Math.max(...data.map(d=>d[2])),orient:'horizontal',bottom:0},series:[{type:'heatmap',data}],backgroundColor:'transparent'});
    } else if (currentChartType==='radar') {
      const inds=numericCols.slice(0,6);
      const indicator=inds.map(c=>({name:c,max:Math.max(...rawData.map(r=>Number(r[c])).filter(v=>!isNaN(v)))}));
      const values=indicator.map(ind=>{ const vals=rawData.map(r=>Number(r[ind.name])).filter(v=>!isNaN(v)); return vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2):0; });
      mainChart.setOption({radar:{indicator,center:['50%','55%'],radius:'65%'},series:[{type:'radar',data:[{value:values,name:'均值'}]}],backgroundColor:'transparent'});
    } else if (currentChartType==='parallel') {
      const dims=numericCols.slice(0,5);
      const data=rawData.map(r=>dims.map(d=>Number(r[d])).filter(v=>!isNaN(v))).filter(arr=>arr.length===dims.length);
      mainChart.setOption({parallelAxis:dims.map(d=>({dim:dims.indexOf(d),name:d})),series:[{type:'parallel',data,lineStyle:{color:'#8B70FF',opacity:0.5}}],backgroundColor:'transparent'});
    }
  }

  function updateInsights() {
    const xCol = document.getElementById('xColSelect').value;
    const yCol = document.getElementById('yColSelect').value;
    let statsHtml = '';
    let corrHtml = '';

    if (numericCols.length === 0) {
      statsHtml = '<span style="color:var(--text3);">未检测到数值列</span>';
    } else {
      statsHtml = '<table class="stat-table"><thead><tr><th>变量</th><th>样本数</th><th>均值</th><th>中位数</th><th>标准差</th><th>范围</th></tr></thead><tbody>';
      numericCols.forEach(col => {
        const vals = rawData.map(r => Number(r[col])).filter(v => !isNaN(v));
        if (vals.length === 0) return;
        const n = vals.length;
        const mean = vals.reduce((a, b) => a + b, 0) / n;
        const sorted = [...vals].sort((a, b) => a - b);
        const median = sorted[Math.floor(n / 2)];
        const min = sorted[0], max = sorted[n - 1];
        const variance = vals.reduce((s, v) => s + (v - mean) ** 2, 0) / n;
        const std = Math.sqrt(variance);
        statsHtml += `<tr>
          <td class="var-name">${col}</td>
          <td>${n}</td><td>${mean.toFixed(2)}</td><td>${median.toFixed(2)}</td><td>${std.toFixed(2)}</td><td>${min.toFixed(2)} — ${max.toFixed(2)}</td>
        </tr>`;
      });
      statsHtml += '</tbody></table>';
    }

    if (xCol && yCol && numericCols.includes(xCol) && numericCols.includes(yCol)) {
      const xVals = rawData.map(r => Number(r[xCol])).filter(v => !isNaN(v));
      const yVals = rawData.map(r => Number(r[yCol])).filter(v => !isNaN(v));
      if (xVals.length === yVals.length && xVals.length > 2) {
        const r = pearsonCorrelation(xVals, yVals);
        const n = xVals.length;
        const tStat = r * Math.sqrt((n - 2) / (1 - r * r));
        const pVal = tTestPValue(Math.abs(tStat), n - 2);
        const sig = pVal < 0.05;
        let conclusion = '';
        const absR = Math.abs(r);
        if (absR >= 0.8) conclusion = '极强相关，可能存在共线性，建议进一步检验';
        else if (absR >= 0.6) conclusion = '强相关，具有重要生物学意义';
        else if (absR >= 0.4) conclusion = '中等程度相关，可结合其他变量综合判断';
        else conclusion = '弱相关或无线性关系，建议尝试非线性模型';

        corrHtml = `
          <div class="corr-vars">${xCol} <span class="corr-arrow">↔</span> ${yCol}</div>
          <div class="corr-main">
            <span class="corr-r">r = ${r.toFixed(4)}</span>
            ${sig ? '<span class="corr-sig">显著</span>' : ''}
          </div>
          <div class="corr-stats">
            <span>n = ${n}</span>
            <span>t = ${tStat.toFixed(3)}</span>
            <span>p ${pVal < 0.0001 ? '< 0.0001' : '= ' + pVal.toFixed(4)}</span>
          </div>
          <div class="corr-conclusion">→ ${conclusion}</div>
        `;
      } else {
        corrHtml = '<span style="color:var(--text3);">所选变量数据不足</span>';
      }
    } else {
      corrHtml = '<span style="color:var(--text3);">请选择两个数值变量以计算相关性</span>';
    }

    document.getElementById('statsContent').innerHTML = statsHtml;
    document.getElementById('corrContent').innerHTML = corrHtml;
  }

  function pearsonCorrelation(x, y) {
    const n = x.length;
    const mx = x.reduce((a,b)=>a+b,0)/n, my = y.reduce((a,b)=>a+b,0)/n;
    let num=0,dx2=0,dy2=0;
    for(let i=0;i<n;i++){ const dx=x[i]-mx,dy=y[i]-my; num+=dx*dy; dx2+=dx*dx; dy2+=dy*dy; }
    const den = Math.sqrt(dx2*dy2);
    return den===0?0:num/den;
  }

  function tTestPValue(t, df) {
    const x = df/(df + t*t);
    return incompleteBeta(x, df/2, 0.5);
  }

  function incompleteBeta(x, a, b) {
    if (x<=0) return 0;
    if (x>=1) return 1;
    const logBeta = lnBeta(a,b);
    const front = Math.exp(Math.log(x)*a + Math.log(1-x)*b - logBeta)/a;
    let f=1,c=1,d=1-(a+b)*x/(a+1);
    if (Math.abs(d)<1e-30) d=1e-30;
    d=1/d; let h=d;
    for(let m=1;m<=200;m++){
      const m2=2*m;
      let aa=m*(b-m)*x/((a+m2-1)*(a+m2));
      d=1+aa*d; if(Math.abs(d)<1e-30) d=1e-30;
      c=1+aa/c; if(Math.abs(c)<1e-30) c=1e-30;
      d=1/d; h*=d*c;
      aa=-(a+m)*(a+b+m)*x/((a+m2)*(a+m2+1));
      d=1+aa*d; if(Math.abs(d)<1e-30) d=1e-30;
      c=1+aa/c; if(Math.abs(c)<1e-30) c=1e-30;
      d=1/d; const del=d*c; h*=del;
      if(Math.abs(del-1)<3e-7) break;
    }
    return front*(h-1);
  }

  function lnBeta(a,b){ return lnGamma(a)+lnGamma(b)-lnGamma(a+b); }
  function lnGamma(z){
    if(z<0.5) return Math.log(Math.PI/Math.sin(Math.PI*z))-lnGamma(1-z);
    z-=1;
    const g=7, c=[0.99999999999980993,676.5203681218851,-1259.1392167224028,771.32342877765313,-176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
    let x=c[0]; for(let i=1;i<g+2;i++) x+=c[i]/(z+i);
    const t=z+g+0.5;
    return Math.log(Math.sqrt(2*Math.PI))+(z+0.5)*Math.log(t)-t+Math.log(x);
  }

  function updateAll(){ updateChart(); updateInsights(); }

  document.querySelectorAll('.chart-type-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('.chart-type-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      currentChartType=this.dataset.type;
      updateChart();
    });
  });
  document.getElementById('updateChart').addEventListener('click',updateAll);

  window.toggleTheme = ()=>{ document.body.classList.toggle('dark'); updateAll(); };
  window.addEventListener('resize',()=>{ if(mainChart) mainChart.resize(); });

  document.getElementById('fileName').textContent='园艺实验数据.xlsx';
  loadData(sampleData);
</script>
</body>
